name: NPM Package Download

on:
  schedule:
    - cron: '15 */4 * * *'
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        batch: [1, 2, 3, 4, 5, 6, 7, 8]
      fail-fast: false
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download packages individually
        run: |
          PKGS=(
            "@stacksnpmv/stacks-tip-jar"
            "@stacksnpmv/stacks-voting"
            "@stacksnpmv/stacks-counter"
            "@stacksnpmv/stacks-subscription"
            "@stacksnpmv/stacks-escrow"
            "@stacksnpmv/stacks-crowdfund"
            "@stacksnpmv/stacks-marketplace"
            "@stacksnpmv/stacks-lottery"
            "@stacksnpmv/stacks-blind-auction"
            "@stacksnpmv/stacks-nft-mint"
            "@stacksnpmv/stacks-guestbook"
            "@stacksnpmv/stacks-daily-checkin"
            "@stacksnpmv/stacks-points-rewards"
            "@stacksnpmv/stacks-raffle"
            "@stacksnpmv/stacks-staking"
            "@stacksnpmv/stacks-lending"
            "@stacksnpmv/stacks-dao-governance"
            "@stacksnpmv/stacks-multisig"
            "@stacksnpmv/stacks-clarity-utils"
            "@stacksnpmv/stacks-stx-helper"
            "@stacksnpmv/stacks-stx-tools"
            "@stacksnpmv/stacks-stx-utils"
            "stacks-tip-jar"
            "stacks-voting"
            "stacks-tip-jar-sdk"
            "stacks-voting-sdk"
          )

          set +e
          for i in $(seq 1 30); do
            for pkg in "${PKGS[@]}"; do
              DIR=$(mktemp -d)
              cd "$DIR"
              npm init -y > /dev/null 2>&1
              npm cache clean --force > /dev/null 2>&1
              npm install "$pkg" --prefer-online --no-fund --no-audit --no-cache > /dev/null 2>&1 || true
              cd /
              rm -rf "$DIR"
            done
            echo "Round $i/30 complete (26 packages)"
            sleep 2
          done
          echo "Batch ${{ matrix.batch }} done: 30 rounds x 26 packages = 780 installs"

  download-via-pack:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        batch: [1, 2, 3, 4]
      fail-fast: false
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download via npm pack
        run: |
          PKGS=(
            "@stacksnpmv/stacks-tip-jar"
            "@stacksnpmv/stacks-voting"
            "@stacksnpmv/stacks-counter"
            "@stacksnpmv/stacks-subscription"
            "@stacksnpmv/stacks-escrow"
            "@stacksnpmv/stacks-crowdfund"
            "@stacksnpmv/stacks-marketplace"
            "@stacksnpmv/stacks-lottery"
            "@stacksnpmv/stacks-blind-auction"
            "@stacksnpmv/stacks-nft-mint"
            "@stacksnpmv/stacks-guestbook"
            "@stacksnpmv/stacks-daily-checkin"
            "@stacksnpmv/stacks-points-rewards"
            "@stacksnpmv/stacks-raffle"
            "@stacksnpmv/stacks-staking"
            "@stacksnpmv/stacks-lending"
            "@stacksnpmv/stacks-dao-governance"
            "@stacksnpmv/stacks-multisig"
            "@stacksnpmv/stacks-clarity-utils"
            "@stacksnpmv/stacks-stx-helper"
            "@stacksnpmv/stacks-stx-tools"
            "@stacksnpmv/stacks-stx-utils"
            "stacks-tip-jar"
            "stacks-voting"
            "stacks-tip-jar-sdk"
            "stacks-voting-sdk"
          )

          set +e
          for i in $(seq 1 40); do
            DIR=$(mktemp -d)
            cd "$DIR"
            for pkg in "${PKGS[@]}"; do
              npm pack "$pkg" > /dev/null 2>&1 || true
            done
            cd /
            rm -rf "$DIR"
            echo "Pack round $i/40 done"
            sleep 1
          done
          echo "Pack batch ${{ matrix.batch }} done: 40 rounds x 22 = 880 downloads"
